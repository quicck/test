<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.08);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        .btn-glass:active:not(:disabled) {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.6);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            padding: 12px 16px;
            outline: none;
            transition: all 0.2s;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #007aff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* iOS Toggle Switch Design */
        .toggle-label {
            width: 52px;
            height: 32px;
            background-color: #e9e9ea;
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
        }

        .toggle-dot {
            width: 28px;
            height: 28px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        .toggle-checkbox:checked + .toggle-label {
            background-color: #34c759;
        }

        .toggle-checkbox:checked + .toggle-label .toggle-dot {
            transform: translateX(20px);
        }

        .spinner {
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #007aff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app-container" class="glass p-8 w-full max-w-md mx-4 text-center">
        <!-- Login UI -->
        <div id="login-ui">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome</h1>
            <p id="init-instruction" class="text-sm text-gray-500 mb-8">マイクを許可して名前を入力してください</p>
            
            <input type="text" id="username-input" maxlength="15" placeholder="名前 (例: たろう)" class="input-glass w-full mb-6 text-center text-lg disabled:opacity-50" disabled>
            
            <button id="join-btn" class="btn-glass w-full py-4 rounded-2xl text-lg font-semibold text-blue-600 shadow-sm disabled:opacity-50" disabled>
                スタート
            </button>
            
            <p id="init-status" class="mt-4 text-xs text-gray-400 flex items-center justify-center gap-2">
                <span class="spinner"></span> 読み込み中...
            </p>
        </div>

        <!-- Chat UI -->
        <div id="chat-ui" class="hidden">
            <h1 id="display-name" class="text-2xl font-bold text-gray-800 mb-1">...</h1>
            <p class="text-[10px] text-gray-400 font-mono mb-6" id="device-id-display"></p>

            <div class="bg-white/40 rounded-2xl p-6 mb-8 border border-white/50">
                <div id="mic-status-icon" class="w-16 h-16 bg-gray-200 rounded-full mx-auto flex items-center justify-center mb-4 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-gray-600">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                    </svg>
                </div>
                <p id="connection-state" class="text-sm font-medium text-gray-700">オンライン</p>
            </div>

            <div class="flex items-center justify-between px-4 mb-8">
                <span class="text-gray-700 font-medium">マイクオン</span>
                <div class="relative inline-block w-14 align-middle select-none">
                    <input type="checkbox" id="mic-toggle" class="toggle-checkbox hidden" checked/>
                    <label for="mic-toggle" class="toggle-label">
                        <div class="toggle-dot"></div>
                    </label>
                </div>
            </div>

            <div class="text-left">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 px-2">参加中メンバー</h2>
                <div id="user-list" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <div id="remote-audios"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'voice-chat-v3-final';

        const servers = {
            iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }],
            iceCandidatePoolSize: 10,
        };

        let localStream = null;
        let pcMap = new Map();
        let myDeviceId = null;
        let myName = "";
        let currentUser = null;
        let heartbeatInterval = null;

        const loginUi = document.getElementById('login-ui');
        const chatUi = document.getElementById('chat-ui');
        const usernameInput = document.getElementById('username-input');
        const joinBtn = document.getElementById('join-btn');
        const initStatus = document.getElementById('init-status');
        const initInstruction = document.getElementById('init-instruction');
        const userList = document.getElementById('user-list');
        const micToggle = document.getElementById('mic-toggle');
        const micStatusIcon = document.getElementById('mic-status-icon');

        async function generateDeviceId() {
            const data = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency,
                navigator.deviceMemory || 'unknown'
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = ((hash << 5) - hash) + data.charCodeAt(i);
                hash = hash & hash;
            }
            const randomSuffix = Math.random().toString(36).substring(2, 6);
            return 'dev-' + Math.abs(hash).toString(16) + '-' + randomSuffix;
        }

        async function setupMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                initStatus.innerHTML = '<span class="text-green-500">●</span> マイク準備完了';
                checkReadyToJoin();
            } catch (err) {
                console.error("Media error:", err);
                initStatus.innerHTML = '<span class="text-red-500">!</span> マイク許可が必要です';
                initInstruction.textContent = "マイク設定を確認し、ページを再読み込みしてください。";
            }
        }

        function checkReadyToJoin() {
            if (localStream && currentUser) {
                usernameInput.disabled = false;
                initStatus.innerHTML = '<span class="text-green-500">●</span> 準備完了';
            }
        }

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                initStatus.textContent = "サーバー接続エラー";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                myDeviceId = await generateDeviceId();
                checkReadyToJoin();
            }
        });

        usernameInput.addEventListener('input', (e) => {
            joinBtn.disabled = e.target.value.trim().length < 1 || !localStream;
        });

        joinBtn.onclick = async () => {
            myName = usernameInput.value.trim();
            if (!myName || !localStream) return;

            loginUi.classList.add('hidden');
            chatUi.classList.remove('hidden');
            document.getElementById('display-name').textContent = myName;
            document.getElementById('device-id-display').textContent = myDeviceId;
            updateMicUI(true);

            // Presence Entry
            await updatePresence();

            // Start Heartbeat
            heartbeatInterval = setInterval(updatePresence, 10000); // Update every 10s

            listenForParticipants();
            listenForIncomingCalls();
        };

        async function updatePresence() {
            if (!myDeviceId || !myName) return;
            const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'presence', myDeviceId);
            try {
                await setDoc(presenceRef, {
                    deviceId: myDeviceId,
                    name: myName,
                    isMuted: !micToggle.checked,
                    lastActive: Date.now() // Heartbeat timestamp
                });
            } catch (e) {
                console.error("Presence update failed", e);
            }
        }

        async function removePresence() {
            if (myDeviceId) {
                const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'presence', myDeviceId);
                await deleteDoc(presenceRef);
            }
        }

        function updateMicUI(isOn) {
            if (isOn) {
                micStatusIcon.classList.add('bg-green-100', 'pulse');
                micStatusIcon.querySelector('svg').classList.add('text-green-600', 'scale-110');
                micStatusIcon.querySelector('svg').classList.remove('text-gray-600');
            } else {
                micStatusIcon.classList.remove('bg-green-100', 'pulse');
                micStatusIcon.querySelector('svg').classList.remove('text-green-600', 'scale-110');
                micStatusIcon.querySelector('svg').classList.add('text-gray-600');
            }
        }

        micToggle.onchange = async () => {
            if (localStream) {
                const isEnabled = micToggle.checked;
                localStream.getAudioTracks()[0].enabled = isEnabled;
                updateMicUI(isEnabled);
                await updatePresence();
            }
        };

        function listenForParticipants() {
            const presenceCol = collection(db, 'artifacts', appId, 'public', 'data', 'presence');
            onSnapshot(presenceCol, (snapshot) => {
                const now = Date.now();
                const timeoutLimit = 30000; // 30 seconds
                
                userList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    
                    // Filter out stale users (disconnected without cleanup)
                    if (now - data.lastActive > timeoutLimit) {
                        return; 
                    }

                    const isMe = data.deviceId === myDeviceId;
                    const el = document.createElement('div');
                    el.className = "flex items-center justify-between bg-white/50 p-3 rounded-xl border border-white/20 mb-1";
                    el.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="status-dot ${data.isMuted ? 'bg-gray-400' : 'bg-green-500 pulse'}"></div>
                            <span class="text-sm font-semibold text-gray-700">${isMe ? data.name + ' (自分)' : data.name}</span>
                        </div>
                        <span class="text-[9px] text-gray-400 bg-white/60 px-2 py-0.5 rounded-full border border-white/40 uppercase">
                            ${data.isMuted ? 'Muted' : 'Voice On'}
                        </span>
                    `;
                    userList.appendChild(el);

                    if (!isMe && !pcMap.has(data.deviceId) && myDeviceId > data.deviceId) {
                        makeCall(data.deviceId);
                    }
                });
            });
        }

        function listenForIncomingCalls() {
            const callsCol = collection(db, 'artifacts', appId, 'public', 'data', 'calls');
            onSnapshot(callsCol, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        if (data.to === myDeviceId && !pcMap.has(data.from)) {
                            answerCall(change.doc.id, data);
                        }
                    }
                });
            });
        }

        // WebRTC Signaling methods (makeCall, answerCall, addRemoteAudio) remain same as previous robust implementation
        async function makeCall(remoteDeviceId) {
            const pc = new RTCPeerConnection(servers);
            pcMap.set(remoteDeviceId, pc);
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = (e) => addRemoteAudio(remoteDeviceId, e.streams[0]);

            const callDoc = doc(collection(db, 'artifacts', appId, 'public', 'data', 'calls'));
            const offerCandidates = collection(db, 'artifacts', appId, 'public', 'data', 'calls', callDoc.id, 'offerCandidates');
            const answerCandidates = collection(db, 'artifacts', appId, 'public', 'data', 'calls', callDoc.id, 'answerCandidates');

            pc.onicecandidate = (e) => e.candidate && addDoc(offerCandidates, e.candidate.toJSON());
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(callDoc, { from: myDeviceId, to: remoteDeviceId, offer: { type: offer.type, sdp: offer.sdp }, timestamp: Date.now() });

            onSnapshot(callDoc, (snap) => {
                const d = snap.data();
                if (!pc.currentRemoteDescription && d?.answer) pc.setRemoteDescription(new RTCSessionDescription(d.answer));
            });
            onSnapshot(answerCandidates, (snap) => {
                snap.docChanges().forEach(c => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
        }

        async function answerCall(callId, data) {
            const pc = new RTCPeerConnection(servers);
            pcMap.set(data.from, pc);
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = (e) => addRemoteAudio(data.from, e.streams[0]);

            const callDoc = doc(db, 'artifacts', appId, 'public', 'data', 'calls', callId);
            const offerCandidates = collection(db, 'artifacts', appId, 'public', 'data', 'calls', callId, 'offerCandidates');
            const answerCandidates = collection(db, 'artifacts', appId, 'public', 'data', 'calls', callId, 'answerCandidates');

            pc.onicecandidate = (e) => e.candidate && addDoc(answerCandidates, e.candidate.toJSON());
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await updateDoc(callDoc, { answer: { type: answer.type, sdp: answer.sdp } });

            onSnapshot(offerCandidates, (snap) => {
                snap.docChanges().forEach(c => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
        }

        function addRemoteAudio(id, stream) {
            let audio = document.getElementById(`audio-${id}`);
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = `audio-${id}`;
                audio.autoplay = true;
                document.getElementById('remote-audios').appendChild(audio);
            }
            audio.srcObject = stream;
        }

        // Improved Exit Handling
        const handleExit = () => {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            removePresence();
        };

        window.addEventListener('beforeunload', handleExit);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                // Not necessarily exiting, but good to signal presence update
                updatePresence();
            }
        });

        window.onload = () => {
            setupMedia();
            initAuth();
        };
    </script>
</body>
</html>
