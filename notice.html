<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラウザ通知テスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-height-screen py-10">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4">
        <h1 class="text-2xl font-bold text-slate-800 mb-2 text-center">通知テスト</h1>
        <p class="text-slate-500 text-sm mb-6 text-center">OSの設定も確認してください</p>
        
        <div id="status" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

        <div class="space-y-4">
            <button id="askBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95">
                1. 許可をリクエスト
            </button>

            <div class="pt-4 border-t border-slate-100">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">待ち時間 (秒)</label>
                <input type="number" id="delayInput" value="5" min="1" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-500 outline-none transition-all text-lg font-mono">
            </div>

            <button id="notifyBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95">
                2. タイマー開始
            </button>
        </div>

        <div class="mt-8 space-y-2">
            <h3 class="text-xs font-bold text-slate-400 uppercase">デバッグ情報:</h3>
            <p id="permDisplay" class="text-xs font-mono text-slate-500">現在の許可状態: 取得中...</p>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const permDisplay = document.getElementById('permDisplay');
        const delayInput = document.getElementById('delayInput');

        function updateStatus() {
            permDisplay.textContent = `現在の許可状態: ${Notification.permission}`;
        }
        updateStatus();

        function showMessage(msg, isError) {
            statusDiv.textContent = msg;
            statusDiv.className = `mb-6 p-4 rounded-xl text-sm font-medium ${isError ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}`;
            statusDiv.classList.remove('hidden');
        }

        // 許可リクエスト
        document.getElementById('askBtn').addEventListener('click', async () => {
            if (!("Notification" in window)) {
                showMessage("このブラウザは通知をサポートしていません", true);
                return;
            }
            const permission = await Notification.requestPermission();
            updateStatus();
            if (permission === "granted") {
                showMessage("通知が許可されました！", false);
            } else {
                showMessage("通知が拒否されました", true);
            }
        });

        // 通知実行
        document.getElementById('notifyBtn').addEventListener('click', () => {
            if (Notification.permission !== "granted") {
                showMessage("通知の許可がありません。上のボタンで許可してください。", true);
                return;
            }

            const seconds = parseInt(delayInput.value) || 5;
            showMessage(`${seconds}秒後に通知します。タブを切り替えてお待ちください。`, false);

            setTimeout(() => {
                try {
                    // 直接Notificationを生成 (より確実な方法)
                    const notification = new Notification("テスト", {
                        body: "指定した時間が経過しました。",
                        icon: "https://cdn-icons-png.flaticon.com/512/3119/3119338.png",
                        requireInteraction: true // ユーザーが閉じるまで残す
                    });

                    notification.onclick = () => {
                        window.focus();
                        notification.close();
                    };
                } catch (e) {
                    // モバイル等のService Workerが必要な環境向けのフォールバック
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification("テスト", {
                            body: "指定した時間が経過しました（SW経由）。"
                        });
                    });
                }
            }, seconds * 1000);
        });

        // Service Workerの最低限の登録（バックグラウンド動作の安定性向上）
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('install', (e) => self.skipWaiting());";
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
