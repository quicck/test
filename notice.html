<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラウザ通知スケジューラー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'sans-serif';
        }
    </style>
</head>
<body>

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">通知スケジューラー</h1>
        
        <div id="status-message" class="mb-4 p-3 rounded-lg text-sm hidden"></div>

        <div class="space-y-4">
            <!-- 許可ボタン -->
            <button id="request-permission" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                1. 通知の許可を求める
            </button>

            <hr class="border-gray-200 my-4">

            <!-- タイマー設定 -->
            <div>
                <label for="seconds" class="block text-sm font-medium text-gray-700 mb-1">何秒後に通知しますか？</label>
                <input type="number" id="seconds" value="5" min="1" class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button id="schedule-notification" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                2. n秒後に通知を予約
            </button>
        </div>

        <p class="mt-6 text-xs text-gray-500 text-center">
            ※通知をテストするには、ブラウザの設定でこのページからの通知を許可してください。<br>
            ブラウザを完全に終了（プロセス終了）させている場合は、OSの制限により届かない場合があります。
        </p>
    </div>

    <script>
        const statusMsg = document.getElementById('status-message');
        const secondsInput = document.getElementById('seconds');
        const requestBtn = document.getElementById('request-permission');
        const scheduleBtn = document.getElementById('schedule-notification');

        // メッセージ表示関数
        function showMessage(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            statusMsg.classList.remove('hidden');
        }

        // 1. Service Workerの登録
        // ブラウザを閉じても通知を送るためには、バックグラウンドで動くService Workerが必要です。
        // ここでは、インラインでService Workerを定義してBlobとして登録します。
        async function registerServiceWorker() {
            const swCode = `
                self.addEventListener('message', (event) => {
                    if (event.data.type === 'SCHEDULE_NOTIFICATION') {
                        const { delay, title, options } = event.data;
                        setTimeout(() => {
                            self.registration.showNotification(title, options);
                        }, delay);
                    }
                });
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            try {
                const registration = await navigator.serviceWorker.register(swUrl);
                console.log('Service Worker registered');
                return registration;
            } catch (err) {
                console.error('Service Worker registration failed:', err);
            }
        }

        // 2. 通知の許可を求める
        requestBtn.addEventListener('click', async () => {
            if (!('Notification' in window)) {
                showMessage('このブラウザは通知に対応していません。', 'error');
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                showMessage('通知が許可されました！', 'success');
            } else {
                showMessage('通知が拒否されました。設定を確認してください。', 'error');
            }
        });

        // 3. 通知をスケジュールする
        scheduleBtn.addEventListener('click', async () => {
            if (Notification.permission !== 'granted') {
                showMessage('まず最初に「通知の許可」ボタンを押して許可してください。', 'error');
                return;
            }

            const seconds = parseInt(secondsInput.value);
            if (isNaN(seconds) || seconds <= 0) {
                showMessage('有効な秒数を入力してください。', 'error');
                return;
            }

            showMessage(`${seconds}秒後に通知を送ります。タブを切り替えても大丈夫です。`, 'success');

            // Service Worker経由で通知を発行
            // 実際の実装では、サーバーからのプッシュ通知が理想的ですが、
            // クライアントサイドのみで完結させるためにSWのshowNotificationを使用します。
            const registration = await navigator.serviceWorker.ready;
            
            setTimeout(() => {
                registration.showNotification('テスト', {
                    body: `${seconds}秒経過しました。`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/1827/1827347.png',
                    tag: 'test-notification', // 同じタグの通知は上書きされる
                    requireInteraction: true // ユーザーが閉じるまで表示し続ける
                });
            }, seconds * 1000);
        });

        // 起動時にSW登録
        if ('serviceWorker' in navigator) {
            registerServiceWorker();
        } else {
            showMessage('お使いのブラウザはService Workerに対応していないため、バックグラウンド通知が制限される可能性があります。', 'error');
        }
    </script>
</body>
</html>
